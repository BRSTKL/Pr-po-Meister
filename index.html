<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0c12">
<title>Verben mit Präpositionen</title>
<meta name="description" content="Almanca fiiller ve edatları öğrenme aracı: Liste, Flashcard, Quiz ve Präpositionaladverbien. A1'den B2'ye kadar 90+ fiil.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM
   ═══════════════════════════════════════════ */
:root {
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  --bg-app: #0a0c12;
  --bg-surface: #111318;
  --bg-card: #171a24;
  --bg-card-alt: #1c1f2c;
  --bg-elevated: #212536;
  --bg-input: #141720;
  --border-1: rgba(255,255,255,0.04);
  --border-2: rgba(255,255,255,0.08);
  --border-3: rgba(255,255,255,0.13);
  --text-1: #eef0f6;
  --text-2: #8a8fa6;
  --text-3: #555972;
  --accent: #5b7cff;
  --accent-2: #7c9aff;
  --accent-bg: rgba(91,124,255,0.1);
  --accent-bg2: rgba(91,124,255,0.18);
  --accent-glow: rgba(91,124,255,0.3);
  --green: #2dd4a0;
  --green-bg: rgba(45,212,160,0.1);
  --green-bd: rgba(45,212,160,0.28);
  --red: #f06060;
  --red-bg: rgba(240,96,96,0.1);
  --red-bd: rgba(240,96,96,0.28);
  --purple: #a78bfa;
  --orange: #f59e0b;
  --a1: #2dd4a0; --a1-bg: rgba(45,212,160,0.08); --a1-bd: rgba(45,212,160,0.22);
  --a2: #5b7cff; --a2-bg: rgba(91,124,255,0.08); --a2-bd: rgba(91,124,255,0.22);
  --b1: #a78bfa; --b1-bg: rgba(167,139,250,0.08); --b1-bd: rgba(167,139,250,0.22);
  --b2: #f59e0b; --b2-bg: rgba(245,158,11,0.08); --b2-bd: rgba(245,158,11,0.22);
  --akk-c: #f97316; --akk-bg: rgba(249,115,22,0.08); --akk-bd: rgba(249,115,22,0.22);
  --dat-c: #2dd4a0; --dat-bg: rgba(45,212,160,0.08); --dat-bd: rgba(45,212,160,0.22);
  --r-sm: 10px; --r-md: 14px; --r-lg: 18px; --r-xl: 22px; --r-pill: 100px;
  --ease: cubic-bezier(.4,0,.2,1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --tab-h: 64px;
  --header-h: 56px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;height:100%;overflow:hidden}
body{
  font-family:var(--font);background:var(--bg-app);color:var(--text-1);
  line-height:1.55;height:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  position:fixed;inset:0;
}

/* ═══════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════ */
.app-shell{
  display:flex;flex-direction:column;
  height:100%;width:100%;max-width:480px;margin:0 auto;
  position:relative;overflow:hidden;
  background:var(--bg-app);
  box-shadow:0 0 80px rgba(0,0,0,0.5);
}

/* STATUS BAR */
.status-bar{
  height:calc(var(--safe-top) + 12px);min-height:12px;
  background:var(--bg-app);flex-shrink:0;
  position:relative;z-index:10;
}

/* APP HEADER */
.app-header{
  flex-shrink:0;height:var(--header-h);
  display:flex;align-items:center;justify-content:center;
  padding:0 20px;position:relative;z-index:10;
  background:rgba(10,12,18,0.85);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border-1);
}

.app-header-title{
  font-size:17px;font-weight:700;color:var(--text-1);
  letter-spacing:-0.01em;
  display:flex;align-items:center;gap:8px;
}

.app-header-title .flag{font-size:20px}

.app-header-sub{
  position:absolute;right:20px;top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:600;color:var(--text-3);
  background:var(--accent-bg);padding:3px 10px;border-radius:var(--r-pill);
  color:var(--accent-2);letter-spacing:0.02em;
}

/* PAGE CONTENT (scrollable) */
.page-content{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 16px 16px;
  scroll-behavior:smooth;
}

.page-content::-webkit-scrollbar{width:0;display:none}

/* ═══════════════════════════════════════════
   BOTTOM TAB BAR
   ═══════════════════════════════════════════ */
.tab-bar{
  flex-shrink:0;
  height:calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  display:flex;align-items:stretch;
  background:rgba(14,16,22,0.92);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-top:1px solid var(--border-1);
  position:relative;z-index:10;
}

.tab{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  border:none;background:transparent;cursor:pointer;
  color:var(--text-3);font-family:var(--font);
  font-size:10px;font-weight:600;letter-spacing:0.01em;
  -webkit-tap-highlight-color:transparent;
  transition:color .2s var(--ease);
  position:relative;padding:0;
}

.tab svg{
  width:24px;height:24px;
  stroke:currentColor;fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  transition:transform .2s var(--ease);
}

.tab.active{color:var(--accent)}
.tab.active svg{transform:scale(1.08)}

.tab.active::before{
  content:'';position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:32px;height:2.5px;border-radius:0 0 4px 4px;
  background:var(--accent);
}

.tab:active{transform:scale(0.92)}

.tab-label{font-size:10px;line-height:1}

/* ═══════════════════════════════════════════
   SECTIONS
   ═══════════════════════════════════════════ */
.section{display:none}
.section.active{display:block;animation:pageIn .35s var(--ease)}

@keyframes pageIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* Section subtitle */
.sec-head{
  padding:16px 0 12px;
  display:flex;align-items:baseline;justify-content:space-between;
}
.sec-title{font-size:22px;font-weight:800;color:var(--text-1);letter-spacing:-0.03em}
.sec-badge{
  font-size:11px;font-weight:600;color:var(--text-3);
  background:var(--bg-elevated);padding:4px 10px;border-radius:var(--r-pill);
}

/* ═══════════════════════════════════════════
   SEARCH
   ═══════════════════════════════════════════ */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;stroke:var(--text-3);fill:none;
  stroke-width:2;stroke-linecap:round;pointer-events:none;
}
.search{
  width:100%;padding:12px 14px 12px 42px;
  border-radius:var(--r-md);border:1px solid var(--border-2);
  background:var(--bg-input);color:var(--text-1);
  font-family:var(--font);font-size:15px;outline:none;
  transition:all .2s var(--ease);
}
.search::placeholder{color:var(--text-3)}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}

/* ═══════════════════════════════════════════
   FILTER CHIPS
   ═══════════════════════════════════════════ */
.filters{
  display:flex;gap:6px;flex-wrap:nowrap;
  margin-bottom:14px;align-items:center;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:2px;
}
.filters::-webkit-scrollbar{display:none}

.fb{
  padding:7px 14px;border-radius:var(--r-pill);
  border:1px solid var(--border-2);background:transparent;
  cursor:pointer;font-size:12px;font-weight:600;
  color:var(--text-3);font-family:var(--font);
  white-space:nowrap;transition:all .15s var(--ease);
  -webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.fb:active{transform:scale(0.93)}

.fb-a1.on{background:var(--a1-bg);color:var(--a1);border-color:var(--a1-bd)}
.fb-a2.on{background:var(--a2-bg);color:var(--a2);border-color:var(--a2-bd)}
.fb-b1.on{background:var(--b1-bg);color:var(--b1);border-color:var(--b1-bd)}
.fb-b2.on{background:var(--b2-bg);color:var(--b2);border-color:var(--b2-bd)}
.fb-akk.on{background:var(--akk-bg);color:var(--akk-c);border-color:var(--akk-bd)}
.fb-dat.on{background:var(--dat-bg);color:var(--dat-c);border-color:var(--dat-bd)}
.fb-all.on{background:var(--accent-bg);color:var(--accent);border-color:rgba(91,124,255,0.22)}

.sep{width:1px;height:22px;background:var(--border-2);flex-shrink:0}

/* ═══════════════════════════════════════════
   STAT PILLS
   ═══════════════════════════════════════════ */
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat{
  flex:1;background:var(--bg-card);border:1px solid var(--border-1);
  border-radius:var(--r-md);padding:12px 14px;
  font-size:11px;color:var(--text-3);font-weight:600;
  letter-spacing:0.02em;text-transform:uppercase;
}
.stat span{
  font-weight:800;color:var(--text-1);font-size:22px;
  display:block;margin-bottom:2px;letter-spacing:-0.02em;
}

/* ═══════════════════════════════════════════
   VERB CARDS
   ═══════════════════════════════════════════ */
.card{
  background:var(--bg-card);border:1px solid var(--border-1);
  border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;
  transition:all .15s var(--ease);
}
.card:active{transform:scale(0.985);background:var(--bg-card-alt)}

.vh{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.vname{font-size:16px;font-weight:700;color:var(--text-1)}

.pbadge{
  padding:3px 9px;border-radius:var(--r-pill);
  font-size:10px;font-weight:700;letter-spacing:0.02em;
}
.akk{background:var(--akk-bg);color:var(--akk-c);border:1px solid var(--akk-bd)}
.dat{background:var(--dat-bg);color:var(--dat-c);border:1px solid var(--dat-bd)}

.lvlbadge{
  padding:2px 8px;border-radius:var(--r-pill);
  font-size:9px;font-weight:700;letter-spacing:0.06em;
}
.la1{background:var(--a1-bg);color:var(--a1);border:1px solid var(--a1-bd)}
.la2{background:var(--a2-bg);color:var(--a2);border:1px solid var(--a2-bd)}
.lb1{background:var(--b1-bg);color:var(--b1);border:1px solid var(--b1-bd)}
.lb2{background:var(--b2-bg);color:var(--b2);border:1px solid var(--b2-bd)}

.vmean{font-size:13px;color:var(--text-2);margin-bottom:8px}

.ex{
  background:var(--bg-elevated);border-radius:var(--r-sm);
  padding:10px 12px;font-size:13px;color:var(--text-1);
  border-left:3px solid var(--accent);line-height:1.6;
}
.extr{font-size:12px;color:var(--text-2);margin-top:4px;font-style:italic}

.empty{padding:3rem 0;text-align:center}
.empty-icon{font-size:44px;display:block;margin-bottom:10px}
.empty-text{font-size:14px;color:var(--text-3)}

/* ═══════════════════════════════════════════
   FLASHCARD
   ═══════════════════════════════════════════ */
.fc-wrap{max-width:100%}

.fc{
  background:linear-gradient(145deg, var(--bg-card) 0%, var(--bg-card-alt) 100%);
  border:1px solid var(--border-2);border-radius:var(--r-xl);
  padding:2.2rem 1.5rem;text-align:center;
  min-height:220px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;margin-bottom:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3), 0 0 1px rgba(255,255,255,0.05) inset;
  transition:all .25s var(--ease);
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.fc::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--purple),var(--accent));
  background-size:200% 100%;
  animation:shimmer 3s ease infinite;
}
@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
.fc:active{transform:scale(0.97)}

.fcv{font-size:28px;font-weight:800;color:var(--text-1);margin-bottom:6px;letter-spacing:-0.03em}
.fcp{font-size:15px;color:var(--accent-2);font-weight:600;margin-bottom:12px}
.fch{font-size:12px;color:var(--text-3);display:flex;align-items:center;gap:6px}
.fch::before{content:'👆';font-size:14px}

.fcb{display:none}.fcb.vis{display:block;animation:pageIn .3s var(--ease)}
.fcm{font-size:15px;color:var(--text-2);margin-bottom:12px}
.fce{font-size:14px;color:var(--text-1);font-style:italic;line-height:1.55}
.fcet{font-size:12px;color:var(--text-2);margin-top:5px}

.fcnav{display:flex;gap:10px;align-items:center;justify-content:center}

.fnbtn{
  padding:12px 22px;border-radius:var(--r-md);
  border:1px solid var(--border-2);background:var(--bg-card);
  cursor:pointer;font-size:14px;font-weight:600;
  font-family:var(--font);color:var(--text-1);
  transition:all .15s var(--ease);-webkit-tap-highlight-color:transparent;
}
.fnbtn:active{transform:scale(0.93);background:var(--bg-elevated)}

.fncnt{font-size:14px;color:var(--text-2);font-weight:600;min-width:60px;text-align:center}

.shuffle-area{margin-top:14px;text-align:center}
.shuffle-btn{
  padding:9px 18px;border-radius:var(--r-pill);
  border:1px solid var(--border-2);background:transparent;
  cursor:pointer;font-size:12px;font-weight:600;
  font-family:var(--font);color:var(--text-3);
  transition:all .15s var(--ease);-webkit-tap-highlight-color:transparent;
}
.shuffle-btn:active{transform:scale(0.93);color:var(--accent);border-color:var(--accent)}

/* Autoplay Panel */
.autoplay-panel {
  background: var(--bg-card-alt);
  border: 1px solid var(--border-2);
  border-radius: var(--r-md);
  padding: 14px;
  margin-top: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.autoplay-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.autoplay-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 6px;
}
.autoplay-status {
  font-size: 12px;
  color: var(--text-2);
  text-align: center;
  min-height: 18px;
  font-weight: 500;
  transition: color 0.2s;
}
.autoplay-status.active {
  color: var(--accent-2);
}
.autoplay-controls {
  display: flex;
  gap: 8px;
  align-items: center;
}
.autoplay-play-btn {
  flex: 1;
  padding: 10px 16px;
  border-radius: var(--r-sm);
  background: var(--accent);
  color: #fff;
  border: none;
  font-weight: 700;
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.15s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.autoplay-play-btn:active {
  transform: scale(0.96);
}
.autoplay-play-btn.playing {
  background: var(--red);
}
.autoplay-speed-container {
  display: flex;
  gap: 4px;
  background: var(--bg-input);
  border: 1px solid var(--border-1);
  padding: 3px;
  border-radius: var(--r-sm);
}
.autoplay-speed-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-2);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.autoplay-speed-btn.on {
  background: var(--bg-elevated);
  color: var(--text-1);
}

/* ═══════════════════════════════════════════
   QUIZ
   ═══════════════════════════════════════════ */
.quiz-wrap{max-width:100%}

.pbar{height:5px;background:var(--bg-elevated);border-radius:3px;margin-bottom:16px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:3px;transition:width .3s var(--ease)}
.ptxt{font-size:12px;color:var(--text-3);margin-bottom:6px;font-weight:600}

.qcard{
  background:var(--bg-card);border:1px solid var(--border-1);
  border-radius:var(--r-lg);padding:20px;margin-bottom:12px;
}
.qtype{
  font-size:10px;color:var(--text-3);letter-spacing:0.1em;
  margin-bottom:10px;text-transform:uppercase;font-weight:700;
}
.qsent{font-size:16px;color:var(--text-1);line-height:1.6;margin-bottom:16px;font-weight:600}

.blank{
  display:inline-block;min-width:80px;
  border-bottom:2.5px solid var(--accent);
  text-align:center;padding:0 4px;color:var(--accent);
}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.obtn{
  padding:13px 14px;border-radius:var(--r-md);
  border:1px solid var(--border-2);background:var(--bg-elevated);
  cursor:pointer;font-size:13px;color:var(--text-1);
  font-family:var(--font);text-align:left;
  transition:all .15s var(--ease);
  -webkit-tap-highlight-color:transparent;font-weight:600;
}
.obtn:active:not(:disabled){transform:scale(0.95);background:var(--accent-bg)}
.obtn.correct{background:var(--green-bg)!important;border-color:var(--green-bd)!important;color:var(--green)!important}
.obtn.wrong{background:var(--red-bg)!important;border-color:var(--red-bd)!important;color:var(--red)!important}
.obtn.show-ok{background:var(--green-bg)!important;border-color:var(--green-bd)!important;color:var(--green)!important}

.fb2{padding:12px 14px;border-radius:var(--r-md);margin-top:10px;font-size:13px;font-weight:600}
.fb2.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.fb2.no{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

.nbtn{
  margin-top:10px;padding:12px 22px;border-radius:var(--r-md);
  border:1px solid rgba(91,124,255,0.25);background:var(--accent-bg);
  cursor:pointer;font-size:13px;color:var(--accent);
  font-family:var(--font);font-weight:700;
  transition:all .15s var(--ease);-webkit-tap-highlight-color:transparent;
}
.nbtn:active{transform:scale(0.93)}

.scard{
  background:var(--bg-card);border:1px solid var(--border-1);
  border-radius:var(--r-xl);padding:2.5rem 1.5rem;text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--accent))}
.sbig{font-size:52px;font-weight:800;color:var(--text-1);margin-bottom:4px;letter-spacing:-0.04em}
.slbl{font-size:14px;color:var(--text-2);margin-bottom:22px}
.rbtn{
  padding:13px 30px;border-radius:var(--r-pill);
  border:none;background:var(--accent);
  cursor:pointer;font-size:14px;font-weight:700;
  font-family:var(--font);color:#fff;
  transition:all .15s var(--ease);-webkit-tap-highlight-color:transparent;
}
.rbtn:active{transform:scale(0.93);opacity:0.9}

/* ═══════════════════════════════════════════
   PA MODULE
   ═══════════════════════════════════════════ */
.section-title{
  font-size:11px;font-weight:800;color:var(--text-3);
  margin-bottom:10px;text-transform:uppercase;letter-spacing:0.12em;
}

.pa-intro{
  background:var(--bg-card);border:1px solid var(--border-1);
  border-radius:var(--r-lg);padding:16px 18px;
  margin-bottom:14px;font-size:13px;color:var(--text-2);line-height:1.7;
}

function initPAData() {
  const vowels = ['a', 'e', 'i', 'o', 'u', 'ä', 'ö', 'ü', 'A', 'E', 'I', 'O', 'U', 'Ä', 'Ö', 'Ü'];
  PA = V.map(v => {
    const staticMatch = staticPA.find(sp => sp.verb === v.v && sp.prep === v.p);
    if (staticMatch) {
      return {
        ...staticMatch,
        level: v.l,
        kasus: v.k
      };
    }
    const firstChar = v.p.charAt(0);
    const isVowel = vowels.includes(firstChar);
    const dar = isVowel ? 'dar' + v.p : 'da' + v.p;
    const wor = isVowel ? 'wor' + v.p : 'wo' + v.p;
    return {
      verb: v.v,
      prep: v.p,
      dar: dar,
      wor: wor,
      ex_da: v.ex,
      ex_da_tr: v.tr,
      ex_wo: `${wor} + ${v.v}?`,
      ex_wo_tr: '',
      level: v.l,
      kasus: v.k
    };
  });
}

let userSelectedVoiceName = localStorage.getItem('user_de_voice_name') || null;
let selectedDeVoice = null;

function getBestGermanVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;
  
  const deVoices = voices.filter(v => v.lang.toLowerCase().startsWith('de'));
  if (deVoices.length === 0) return null;
  
  if (userSelectedVoiceName) {
    const match = deVoices.find(v => v.name === userSelectedVoiceName);
    if (match) return match;
  }
  
  const scoredVoices = deVoices.map(v => {
    const nameL = v.name.toLowerCase();
    let score = 0;
    
    if (nameL.includes('siri')) score += 150;
    if (nameL.includes('yannick')) score += 100;
    if (nameL.includes('marlene')) score += 100;
    if (nameL.includes('anna')) score += 80;
    if (nameL.includes('martin')) score += 80;
    if (nameL.includes('helen')) score += 80;
    if (nameL.includes('enhanced')) score += 40;
    if (nameL.includes('premium')) score += 40;
    if (nameL.includes('natural')) score += 30;
    if (nameL.includes('neural')) score += 30;
    if (nameL.includes('google')) score += 20;
    if (nameL.includes('microsoft')) score += 20;
    if (nameL.includes('network')) score += 20;
    
    if (nameL.includes('local')) score -= 50;
    if (nameL.includes('basic')) score -= 50;
    if (nameL.includes('low')) score -= 50;
    if (nameL.includes('sandy')) score -= 100;
    if (nameL.includes('flo')) score -= 100;
    if (nameL.includes('eddy')) score -= 100;
    
    if (!v.localService) score += 10;
    
    return { voice: v, score: score };
  });
  
  scoredVoices.sort((a, b) => b.score - a.score);
  return scoredVoices[0].voice;
}

function updateActiveVoiceIndicator() {
  if (!('speechSynthesis' in window)) return;
  const voices = window.speechSynthesis.getVoices();
  const deVoices = voices.filter(v => v.lang.toLowerCase().startsWith('de'));
  
  selectedDeVoice = getBestGermanVoice();
  
  document.querySelectorAll('.voice-select').forEach(select => {
    select.innerHTML = '';
    
    if (deVoices.length === 0) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'Almanca Ses Yok';
      select.appendChild(opt);
      select.style.borderColor = 'var(--red)';
      return;
    }
    
    select.style.borderColor = 'var(--border-2)';
    deVoices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      let dispName = v.name.replace('Microsoft', '').replace('Google', '').replace('German', '').replace('Deutsch', '').trim();
      opt.textContent = dispName || v.name;
      if (selectedDeVoice && v.name === selectedDeVoice.name) {
        opt.selected = true;
      }
      select.appendChild(opt);
    });
  });
  
  const voiceText = selectedDeVoice ? selectedDeVoice.name : "⚠️ Almanca Ses Paketi Eksik!";
  document.querySelectorAll('.active-voice-name').forEach(el => {
    el.textContent = voiceText;
    el.style.color = selectedDeVoice ? "var(--accent)" : "var(--red)";
  });
}

function speak(text, callback){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='de-DE';
    
    if (!selectedDeVoice) {
      selectedDeVoice = getBestGermanVoice();
    }
    
    if(selectedDeVoice) u.voice = selectedDeVoice;
    u.rate = 0.90;
    u.pitch = 1.0;
    
    let callbackCalled = false;
    const triggerCallback = () => {
      if (callbackCalled) return;
      callbackCalled = true;
      if (callback) callback();
    };
    
    u.onend = () => {
      setTimeout(triggerCallback, 50);
    };
    
    u.onerror = (err) => {
      console.warn("TTS speak error:", err);
      setTimeout(triggerCallback, 50);
    };
    
    const fallbackTimer = setTimeout(() => {
      triggerCallback();
    }, 12000);
    
    const originalCallback = callback;
    callback = () => {
      clearTimeout(fallbackTimer);
      if (originalCallback) originalCallback();
    };
    
    window.speechSynthesis.speak(u);
  } else {
    if (callback) {
      setTimeout(callback, 1500);
    }
  }
}

function loadProgress(){
  try{
    const saved=localStorage.getItem('deutsch_verben_progress');
    userProgress=saved?JSON.parse(saved):{};
    let migrated = false;
    for (const key in userProgress) {
      if (userProgress[key].status !== undefined) {
        const status = userProgress[key].status;
        userProgress[key].score = status === 'mastered' ? 5 : (status === 'learning' ? 2 : 0);
        delete userProgress[key].status;
        migrated = true;
      }
      if (userProgress[key].score === undefined) {
        userProgress[key].score = 0;
      }
    }
    if (migrated) saveProgress();
  }catch(e){
    userProgress={};
  }
}

function saveProgress(){
  try{
    localStorage.setItem('deutsch_verben_progress',JSON.stringify(userProgress));
  }catch(e){}
}

function getWordKey(v,p){
  return v+'+'+p;
}

function getWordState(v,p){
  const key=getWordKey(v,p);
  const state=userProgress[key]||{score:0,paScore:0,starred:false};
  if(state.paScore===undefined)state.paScore=0;
  return state;
}

function setWordScore(v,p,score){
  const key=getWordKey(v,p);
  if(!userProgress[key])userProgress[key]={score:0,paScore:0,starred:false};
  userProgress[key].score=Math.max(0,Math.min(5,score));
  saveProgress();
  updateProgressUI();
}

function adjustWordScore(v,p,delta){
  const state=getWordState(v,p);
  const newScore=Math.max(0,Math.min(5,(state.score || 0)+delta));
  setWordScore(v,p,newScore);
}

function setPAWordScore(v,p,score){
  const key=getWordKey(v,p);
  if(!userProgress[key])userProgress[key]={score:0,paScore:0,starred:false};
  userProgress[key].paScore=Math.max(0,Math.min(5,score));
  saveProgress();
}

function adjustPAWordScore(v,p,delta){
  const state=getWordState(v,p);
  const newScore=Math.max(0,Math.min(5,(state.paScore || 0)+delta));
  setPAWordScore(v,p,newScore);
}

function toggleWordStar(v,p){
  const key=getWordKey(v,p);
  if(!userProgress[key])userProgress[key]={score:0,paScore:0,starred:false};
  userProgress[key].starred=!userProgress[key].starred;
  saveProgress();
  updateProgressUI();
  return userProgress[key].starred;
}

function updateProgressUI(){
  const total=V.length;
  let scoreSum=0;
  for(const v of V){
    const state=getWordState(v.v,v.p);
    scoreSum+=(state.score || 0);
  }
  const maxPossible=total*5;
  const pct=maxPossible>0?Math.round(scoreSum/maxPossible*100):0;
  const txt=document.getElementById('progress-text');
  const bar=document.getElementById('progress-bar-fill');
  if(txt)txt.textContent=`${pct}% (Genel İlerleme)`;
  if(bar)bar.style.width=`${pct}%`;
}

function getWeightedRandomSample(pool, sampleSize){
  if (!pool || pool.length === 0) return [];
  if (pool.length <= sampleSize) {
    return [...pool].sort(()=>Math.random()-0.5);
  }
  const weightMap = { 0: 1.0, 1: 0.8, 2: 0.6, 3: 0.4, 4: 0.2, 5: 0.05 };
  const result = [];
  const tempPool = [...pool];
  for (let i = 0; i < sampleSize; i++) {
    let totalWeight = 0;
    const itemWeights = tempPool.map(v => {
      const state = getWordState(v.v, v.p);
      const score = state.score !== undefined ? state.score : 0;
      const w = weightMap[score] !== undefined ? weightMap[score] : 1.0;
      totalWeight += w;
      return w;
    });
    let randomVal = Math.random() * totalWeight;
    let selectedIdx = 0;
    for (let j = 0; j < tempPool.length; j++) {
      randomVal -= itemWeights[j];
      if (randomVal <= 0) {
        selectedIdx = j;
        break;
      }
    }
    result.push(tempPool[selectedIdx]);
    tempPool.splice(selectedIdx, 1);
  }
  return result;
}

function filteredPA(settings){
  return PA.filter(p => {
    const match = V.find(item => item.v === p.verb && item.p === p.prep);
    if (!match) return false;
    if (settings.levels && settings.levels.length < 4) {
      if (!settings.levels.includes(match.l)) return false;
    }
    if (settings.kasus && settings.kasus !== 'all' && match.k !== settings.kasus) return false;
    if (settings.starredOnly) {
      const progress = getWordState(p.verb, p.prep);
      if (!progress.starred) return false;
    }
    return true;
  });
}

// TAB SWITCHING

const tabNames=['liste','karten','quiz','pa','stats'];

function switchTab(n){
  if (n !== 'karten' && typeof stopFCAutoPlay === 'function') {
    stopFCAutoPlay();
  }
  tabNames.forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===n);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+n).classList.add('active');
  // Scroll to top on tab switch
  document.getElementById('page-content').scrollTop=0;
  // Update header
  document.getElementById('header-text').textContent=headerTitles[n]||'Verben mit Präp.';
  if(n==='quiz'&&qData.length===0)showQuizSetup();
  if(n==='karten'){applyFCFilter();renderFC();}
  if(n==='pa')renderLessons();
  if(n==='stats')renderStats();
}

// ═══════════════════════════════════════════
// FILTER LOGIC
// ═══════════════════════════════════════════
function filtered(f){
  return V.filter(v=>{
    if(f.level&&f.level!=='all'&&v.l!==f.level)return false;
    if(f.kasus&&f.kasus!=='all'&&v.k!==f.kasus)return false;
    if(f.status&&f.status!=='all'){
      const progress=getWordState(v.v,v.p);
      if(f.status==='starred'&&!progress.starred)return false;
      if(f.status==='unseen'&&progress.score===5)return false;
      if(f.status==='mastered'&&progress.score!==5)return false;
    }
    return true;
  });
}

function setLF(type,val){
  lf[type]=val;
  if(type==='level'){
    ['all','a1','a2','b1','b2'].forEach(x=>{const e=document.getElementById('fl-'+x);if(e)e.classList.remove('on');});
    const el=document.getElementById('fl-'+(val==='all'?'all':val.toLowerCase()));
    if(el)el.classList.add('on');
  } else if(type==='kasus') {
    ['all','akk','dat'].forEach(x=>{const e=document.getElementById('fk-'+x);if(e)e.classList.remove('on');});
    const el=document.getElementById('fk-'+(val==='all'?'all':val.toLowerCase()));
    if(el)el.classList.add('on');
  } else if(type==='status') {
    ['all','starred','unseen','mastered'].forEach(x=>{const e=document.getElementById('fs-'+x);if(e)e.classList.remove('on');});
    const el=document.getElementById('fs-'+(val==='all'?'all':val.toLowerCase()));
    if(el)el.classList.add('on');
  }
  renderListe();
}

function setFCF(type,val){
  fcf[type]=val;
  if(type==='level'){
    ['all','a1','a2','b1','b2'].forEach(x=>{const e=document.getElementById('fck-'+x);if(e)e.classList.remove('on');});
    const el=document.getElementById('fck-'+(val==='all'?'all':val.toLowerCase()));
    if(el)el.classList.add('on');
  } else if(type==='kasus') {
    ['kall','kakk','kdat'].forEach(x=>{const e=document.getElementById('fck-'+x);if(e)e.classList.remove('on');});
    const map={all:'kall',Akk:'kakk',Dat:'kdat'};
    const el=document.getElementById('fck-'+map[val]);
    if(el)el.classList.add('on');
  } else if(type==='status') {
    ['sall','sstarred','sunseen','smastered'].forEach(x=>{const e=document.getElementById('fck-'+x);if(e)e.classList.remove('on');});
    const map={all:'sall',starred:'sstarred',unseen:'sunseen',mastered:'smastered'};
    const el=document.getElementById('fck-'+map[val]);
    if(el)el.classList.add('on');
  }
  applyFCFilter();renderFC();
}

  btn.classList.add('on');

  switchTab('quiz');
  quizSettings.type = type;
  if (type === 'standard' && filter) {
    quizSettings.kasus = filter;
  }
  showQuizSetup();
  startQuiz();
}


function toggleQuizLevel(level, btn) {
  const settings = quizSettings;
  const allLevels = ['A1', 'A2', 'B1', 'B2'];
  
  if (level === 'all') {
    settings.levels = [...allLevels];
  } else {
    if (settings.levels.includes(level)) {
      if (settings.levels.length > 1) {
        settings.levels = settings.levels.filter(l => l !== level);
      }
    } else {
      settings.levels.push(level);
    }
  }
  
  const container = btn.parentElement;
  const isAllSelected = settings.levels.length === 4;
  
  const btnAll = container.querySelector('.fb-all');
  if (btnAll) btnAll.classList.toggle('on', isAllSelected);
  
  allLevels.forEach(lvl => {
    const btnLvl = container.querySelector('.fb-' + lvl.toLowerCase());
    if (btnLvl) {
      btnLvl.classList.toggle('on', settings.levels.includes(lvl));
    }
  });
}

function handleToggleStar(verb,prep){
  toggleWordStar(verb,prep);
  renderListe();
}

function handleCycleScore(verb,prep){
  const state=getWordState(verb,prep);
  const score=state.score!==undefined?state.score:0;
  const newScore=(score+1)%6;
  setWordScore(verb,prep,newScore);
  renderListe();
}

function renderListe(){
  const q=(document.getElementById('srch')||{}).value||'';
  const data=filtered(lf).filter(v=>!q||v.v.toLowerCase().includes(q.toLowerCase())||v.p.toLowerCase().includes(q.toLowerCase())||v.m.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('st-total').textContent=data.length;
  document.getElementById('st-akk').textContent=data.filter(v=>v.k==='Akk').length;
  document.getElementById('st-dat').textContent=data.filter(v=>v.k==='Dat').length;
  const c=document.getElementById('liste-c');
  if(!data.length){c.innerHTML='<div class="empty"><span class="empty-icon">🔍</span><div class="empty-text">Sonuç bulunamadı.</div></div>';return;}
  c.innerHTML=data.map(v=>{
    const progress=getWordState(v.v,v.p);
    const isStarred=progress.starred;
    const score=progress.score!==undefined?progress.score:0;
    const cardStatusClass=score===5?'status-5':(score>0?'status-1':'');
    
    const starChar=isStarred?'★':'☆';
    const starColor=isStarred?'var(--orange)':'var(--text-3)';
    
    let gauge='';
    for(let i=1;i<=5;i++){
      const barColor=i<=score?(score===5?'var(--green)':'var(--accent)'):'var(--border-3)';
      gauge+=`<span style="width:3px;height:9px;border-radius:1px;background:${barColor};display:inline-block;"></span>`;
    }
    
    return `<div class="card ${cardStatusClass}">
      <div class="vh">
        <span class="vname">${v.v}</span>
        <span class="pbadge ${v.k==='Akk'?'akk':'dat'}">${v.p} + ${v.k}</span>
        <span class="lvlbadge l${v.l.toLowerCase()}">${v.l}</span>
        <button class="speak-btn" onclick="event.stopPropagation(); speak('${v.v.replace(/'/g, "\\'")} ${v.p.replace(/'/g, "\\'")}')" title="Fiil ve edatı seslendir" style="padding: 4px; border-radius: var(--r-sm);">
          <svg viewBox="0 0 24 24" style="width:14px; height:14px;"><path fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>
        </button>
        <div style="margin-left: auto; display: flex; gap: 8px; align-items: center;">
          <button class="card-btn" onclick="event.stopPropagation(); handleToggleStar('${v.v.replace(/'/g, "\\'")}', '${v.p.replace(/'/g, "\\'")}')" style="color: ${starColor};">${starChar}</button>
          <div class="card-btn" onclick="event.stopPropagation(); handleCycleScore('${v.v.replace(/'/g, "\\'")}', '${v.p.replace(/'/g, "\\'")}')" style="display: flex; gap: 2px; align-items: center; padding: 4px; border-radius: var(--r-sm); background: var(--bg-elevated); border: 1px solid var(--border-2); cursor: pointer;" title="Öğrenme Seviyesi: ${score}/5 (Değiştirmek için tıkla)">
            ${gauge}
          </div>
        </div>
      </div>
      <div class="vmean">${v.m}</div>
      <div class="ex" style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
        <div>
          ${hl(v.ex,v.v,v.p)}
          <div class="extr">${v.tr}</div>
        </div>
        <button class="speak-btn" onclick="event.stopPropagation(); speak('${v.ex.replace(/'/g, "\\'")}')" title="Cümleyi seslendir" style="flex-shrink:0;">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function hl(s,verb,prep){
  let r=s;
  const base=verb.replace('sich ','').replace(/en$/,'');
  r=r.replace(new RegExp('\\b('+base+'\\w*)\\b','gi'),m=>'<strong>'+m+'</strong>');
  r=r.replace(new RegExp('\\b'+prep+'\\b','g'),m=>'<span style="color:var(--accent);font-weight:700">'+m+'</span>');
  return r;
}

function applyFCFilter(){
  const pool=filtered(fcf);
  fcData=getWeightedRandomSample(pool,pool.length);
  if(!fcData.length)fcData=[...V];
  fcIdx=0;
}

function renderFC(){
  if(!fcData.length)applyFCFilter();
  fcFlip=false;
  const v=fcData[fcIdx];
  document.getElementById('fc-verb').textContent=v.v;
  document.getElementById('fc-prep').textContent=v.p+' + '+v.k+' ('+v.l+')';
  document.getElementById('fc-mean').textContent=v.m;
  document.getElementById('fc-ex').textContent=v.ex;
  document.getElementById('fc-extr').textContent=v.tr;
  document.getElementById('fc-back').classList.remove('vis');
  document.getElementById('fc-front').style.display='flex';
  document.getElementById('fc-front').style.flexDirection='column';
  document.getElementById('fc-front').style.alignItems='center';
  document.getElementById('fc-cnt').textContent=(fcIdx+1)+' / '+fcData.length;
  
  const progress=getWordState(v.v,v.p);
  const score=progress.score!==undefined?progress.score:0;
  const fcStar=document.getElementById('fc-star');
  if(fcStar){
    fcStar.textContent=progress.starred?'★':'☆';
    fcStar.style.color=progress.starred?'var(--orange)':'var(--text-3)';
  }
  
  const fcCard=document.getElementById('fc-card');
  if(fcCard){
    fcCard.style.borderLeft=score===5?'4px solid var(--green)':(score>0?'4px solid var(--accent)':'1px solid var(--border-2)');
  }
  updateActiveVoiceIndicator();
}

function toggleCurrentFCStar(){
  if(!fcData||!fcData.length)return;
  const v=fcData[fcIdx];
  const isStarred=toggleWordStar(v.v,v.p);
  const fcStar=document.getElementById('fc-star');
  if(fcStar){
    fcStar.textContent=isStarred?'★':'☆';
    fcStar.style.color=isStarred?'var(--orange)':'var(--text-3)';
  }
  renderListe();
}

function handleFCEvaluation(status){
  if(!fcData||!fcData.length)return;
  const v=fcData[fcIdx];
  if(status==='mastered'){
    adjustWordScore(v.v,v.p,1);
  }else{
    adjustWordScore(v.v,v.p,-2);
  }
  fcMove(1);
}

function flipCard(){
  fcFlip=!fcFlip;
  document.getElementById('fc-back').classList.toggle('vis',fcFlip);
  document.getElementById('fc-front').style.display=fcFlip?'none':'flex';
}

function fcMove(d){fcIdx=(fcIdx+d+fcData.length)%fcData.length;renderFC();}
function shuffleFC(){fcData=[...fcData].sort(()=>Math.random()-0.5);fcIdx=0;renderFC();}

// CARD AUTOPLAY (ELLER SERBEST)
let fcAutoPlay = false;
let fcTimer = null;
let fcSpeed = 'normal'; // 'slow', 'normal', 'fast'

const fcSpeedSettings = {
  slow: { front: 4000, back: 5000 },
  normal: { front: 2500, back: 3500 },
  fast: { front: 1500, back: 2200 }
};

function toggleFCAutoPlay() {
  if (fcAutoPlay) {
    stopFCAutoPlay();
  } else {
    startFCAutoPlay();
  }
}

function startFCAutoPlay() {
  fcAutoPlay = true;
  
  const btn = document.getElementById('fc-autoplay-btn');
  if (btn) {
    btn.innerHTML = '⏸️ Duraklat';
    btn.classList.add('playing');
  }
  const statusEl = document.getElementById('fc-autoplay-status');
  if (statusEl) {
    statusEl.classList.add('active');
  }
  
  if (fcFlip) {
    flipCard();
  }
  
  runFCAutoPlayLoop();
}

function stopFCAutoPlay() {
  fcAutoPlay = false;
  if (fcTimer) {
    clearTimeout(fcTimer);
    fcTimer = null;
  }
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  
  const btn = document.getElementById('fc-autoplay-btn');
  if (btn) {
    btn.innerHTML = '▶️ Oynat';
    btn.classList.remove('playing');
  }
  const statusEl = document.getElementById('fc-autoplay-status');
  if (statusEl) {
    statusEl.textContent = 'Duraklatıldı';
    statusEl.classList.remove('active');
  }
}

function setFCAutoPlaySpeed(speed) {
  fcSpeed = speed;
  ['slow', 'normal', 'fast'].forEach(s => {
    const el = document.getElementById('fc-speed-' + s);
    if (el) el.classList.toggle('on', s === speed);
  });
}

function runFCAutoPlayLoop() {
  if (!fcAutoPlay) return;
  if (!fcData || !fcData.length) return;
  
  const v = fcData[fcIdx];
  const speed = fcSpeedSettings[fcSpeed] || fcSpeedSettings.normal;
  const statusEl = document.getElementById('fc-autoplay-status');
  
  if (statusEl) statusEl.textContent = '🔊 Almanca fiil seslendiriliyor...';
  
  speak(v.v + ' ' + v.p, () => {
    if (!fcAutoPlay) return;
    
    let countdown = Math.round(speed.front / 1000);
    if (statusEl) statusEl.textContent = '⏳ Çeviriyi düşünün... (' + countdown + 's)';
    
    const intervalTime = 1000;
    let elapsed = 0;
    
    const waitFront = () => {
      if (!fcAutoPlay) return;
      elapsed += intervalTime;
      if (elapsed >= speed.front) {
        flipCard();
        
        if (statusEl) statusEl.textContent = '🔊 Örnek cümle seslendiriliyor...';
        speak(v.ex, () => {
          if (!fcAutoPlay) return;
          
          let backCountdown = Math.round(speed.back / 1000);
          if (statusEl) statusEl.textContent = '⏳ Sonraki kelimeye geçiliyor... (' + backCountdown + 's)';
          
          let backElapsed = 0;
          const waitBack = () => {
            if (!fcAutoPlay) return;
            backElapsed += intervalTime;
            if (backElapsed >= speed.back) {
              fcMove(1);
              runFCAutoPlayLoop();
            } else {
              let currentSec = Math.max(0, Math.round((speed.back - backElapsed) / 1000));
              if (statusEl) statusEl.textContent = '⏳ Sonraki kelimeye geçiliyor... (' + currentSec + 's)';
              fcTimer = setTimeout(waitBack, intervalTime);
            }
          };
          fcTimer = setTimeout(waitBack, intervalTime);
        });
      } else {
        let currentSec = Math.max(0, Math.round((speed.front - elapsed) / 1000));
        if (statusEl) statusEl.textContent = '⏳ Çeviriyi düşünün... (' + currentSec + 's)';
        fcTimer = setTimeout(waitFront, intervalTime);
      }
    };
    
    fcTimer = setTimeout(waitFront, intervalTime);
  });
}

            <button class="rbtn" onclick="showQuizSetup()" style="width: 100%;">Ayarlara Dön</button>
          </div>
        `;
      }
      return;
    }
    pqData = getWeightedRandomSamplePA(pool, Math.min(10, pool.length));
    pqIdx=0;pqScore=0;renderPAQuiz();
  } else if (quizSettings.type === 'wurde_geworden_worden') {
    startWurdeQuiz();
  } else if (quizSettings.type === 'reflexive_pronouns') {
    startReflexiveQuiz();
  } else if (quizSettings.type === 'nullartikel') {
    startNullartikelQuiz();
  } else {
    let pool=V;
    if(quizSettings.levels && quizSettings.levels.length < 4){
      pool=pool.filter(v=>quizSettings.levels.includes(v.l));
    }
    if(quizSettings.kasus!=='all'){
      pool=pool.filter(v=>v.k===quizSettings.kasus);
    }
    if(quizSettings.starredOnly){
      pool=pool.filter(v=>{
        const state=getWordState(v.v,v.p);
        return state.starred;
      });
    }
    
    if(!pool.length){
      if(c){
        c.innerHTML=`
          <div class="scard" style="padding: 30px 20px;">
            <div style="font-size: 40px; margin-bottom: 12px;">⚠️</div>

            <button class="rbtn" onclick="showQuizSetup()" style="width: 100%;">Ayarlara Dön</button>
          </div>
        `;
      }
      return;
    }
    
    qData=getWeightedRandomSample(pool,Math.min(10,pool.length));
    qIdx=0;qScore=0;renderQuiz();
  }
}

function renderQuiz(){
  const c=document.getElementById('quiz-c');
  if(qIdx>=qData.length){
    recordQuizCompletion(qScore, qData.length);

    c.innerHTML=`<div class="scard">
      <div style="font-size:40px;margin-bottom:10px">${e}</div>
      <div class="sbig">${qScore}/${qData.length}</div>

      </div>
    </div>`;
    return;
  }
  const q=qData[qIdx];
  const pct=Math.round(qIdx/qData.length*100);
  const type=qIdx%3;
  let qHTML='',opts=[],correct='';
  const allPreps=[...new Set(V.map(v=>v.p))];
  if(type===0){
    const getWordsToReplace = (p) => {
      const arr = [p, 'da'+p, 'dar'+p, 'wo'+p, 'wor'+p];
      if(p==='zu') arr.push('zum','zur');
      if(p==='an') arr.push('am','ans');
      if(p==='in') arr.push('im','ins');
      if(p==='von') arr.push('vom');
      if(p==='bei') arr.push('beim');
      return arr.sort((a,b)=>b.length-a.length);
    };
    const prepsToHide = getWordsToReplace(q.p);
    const sent = q.ex.replace(new RegExp('\\b(' + prepsToHide.join('|') + ')\\b', 'gi'), '___');
    const dist=allPreps.filter(p=>p!==q.p).sort(()=>Math.random()-0.5).slice(0,3);
    opts=[...dist,q.p].sort(()=>Math.random()-0.5);correct=q.p;
    qHTML=`<div class="qtype">Doğru edatı seç</div><div class="qsent">${sent.replace('___','<span class="blank">___</span>')}</div>`;
  } else if(type===1){
    const dist=V.filter(v=>v.v!==q.v).sort(()=>Math.random()-0.5).slice(0,3);
    opts=[...dist.map(v=>v.m),q.m].sort(()=>Math.random()-0.5);correct=q.m;
    qHTML=`<div class="qtype">Türkçe anlamı nedir?</div><div class="qsent">${q.v} + <span style="color:var(--accent)">${q.p}</span> <span style="font-size:11px;color:var(--text-3)">(${q.l})</span></div>`;
  } else {
    const dist=V.filter(v=>v.v!==q.v||v.p!==q.p).sort(()=>Math.random()-0.5).slice(0,3);
    opts=[...dist.map(v=>v.v+' + '+v.p),q.v+' + '+q.p].sort(()=>Math.random()-0.5);correct=q.v+' + '+q.p;
    qHTML=`<div class="qtype">Hangi fiil + edat?</div><div class="qsent">${q.m}</div>`;
  }
  currentQuestion.correct = correct;
  currentQuestion.ex = q.ex;
  currentQuestion.tr = q.tr;

  c.innerHTML=`<div class="ptxt">${qIdx+1} / ${qData.length}</div>
  <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  <div class="qcard">${qHTML}
    <div class="opts">${opts.map(o=>`<button class="obtn" data-val="${o.replace(/"/g,'&quot;')}" onclick="checkQ(this)">${o}</button>`).join('')}</div>
    <div id="qfb"></div>
  </div>`;
  qAnswered=false;
}

function generateReflexiveQuizData() {
  const list = [];
  
  // 1. Gather reflexive verbs from V (which are Akkusativ reflexive in V)
  V.forEach(item => {
    if (item.v.startsWith('sich ')) {
      const ex = item.ex;
      const matches = [];
      const words = ex.toLowerCase().replace(/[.,!?;:]/g, '').split(/\s+/);
      
      const akkPronouns = ['mich', 'dich', 'sich', 'uns', 'euch'];
      akkPronouns.forEach(p => {
        if (words.includes(p)) {
          matches.push(p);
        }
      });
      
      if (matches.length > 0) {
        let correctPronoun = matches[0];
        if (matches.length > 1) {
          const firstWord = words[0];
          if (firstWord === 'ich') correctPronoun = 'mich';
          else if (firstWord === 'du') correctPronoun = 'dich';
          else if (firstWord === 'wir') correctPronoun = 'uns';
          else if (firstWord === 'ihr') correctPronoun = 'euch';
          else correctPronoun = 'sich';
        }
        
        const regex = new RegExp('\\b' + correctPronoun + '\\b', 'i');
        const qText = item.ex.replace(regex, '___');
        
        if (qText !== item.ex) {
          list.push({
            verb: item.v,
            q: qText,
            a: correctPronoun,
            o: getReflexivePronounOptions(correctPronoun),
            e: `<strong>${item.v}</strong> fiili Akkusativ dönüşlü zamir alır. Cümledeki özneye göre uygun zamir: <strong>${correctPronoun}</strong>.`,
            tr: item.tr
          });
        }
      }
    }
  });

  // 2. Dativ reflexive verbs
  const dativVerbs = [
    { v: 'sich etwas merken', ex: 'Ich merke mir die Telefonnummer.', a: 'mir', tr: 'Telefon numarasını aklımda tutuyorum.', e: 'sich etwas merken → Dativ Reflexivpronomen: mir (ich)' },
    { v: 'sich etwas merken', ex: 'Kannst du dir diesen Namen merken?', a: 'dir', tr: 'Bu ismi aklında tutabilir misin?', e: 'sich etwas merken → Dativ: dir (du)' },
    { v: 'sich etwas vorstellen', ex: 'Ich kann mir ein Leben ohne Handy nicht vorstellen.', a: 'mir', tr: 'Telefonsuz bir hayatı hayal edemiyorum.', e: 'sich etwas vorstellen → Dativ: mir (ich)' },
    { v: 'sich etwas vorstellen', ex: 'Stell dir vor, du gewinnst im Lotto!', a: 'dir', tr: 'Hayal et, lottoyu kazandın!', e: 'sich etwas vorstellen → Dativ: dir (du)' },
    { v: 'sich etwas leisten können', ex: 'Ich kann mir dieses Auto nicht leisten.', a: 'mir', tr: 'Bu arabaya gücüm yetmiyor.', e: 'sich etwas leisten können → Dativ: mir (ich)' },
    { v: 'sich etwas leisten können', ex: 'Wir können uns jedes Jahr einen Urlaub leisten.', a: 'uns', tr: 'Her yıl bir tatile gücümüz yetiyor.', e: 'sich etwas leisten können → Dativ: uns (wir)' },
    { v: 'sich etwas wünschen', ex: 'Ich wünsche mir ein neues Fahrrad zum Geburtstag.', a: 'mir', tr: 'Doğum günüm için yeni bir bisiklet diliyorum.', e: 'sich etwas wünschen → Dativ: mir (ich)' },
    { v: 'sich etwas wünschen', ex: 'Was wünschst du dir fürs new Jahr?', a: 'dir', tr: 'Yeni yıl için ne diliyorsun?', e: 'sich etwas wünschen → Dativ: dir (du)' },
    { v: 'sich etwas überlegen', ex: 'Ich überlege mir, ob ich den Job annehme.', a: 'mir', tr: 'İşi kabul edip etmeyeceğimi düşünüyorum.', e: 'sich etwas überlegen → Dativ: mir (ich)' },
    { v: 'sich etwas überlegen', ex: 'Überleg dir das gut, bevor du unterschreibst.', a: 'dir', tr: 'İmzalamadan önce bunu iyice düşün.', e: 'sich etwas überlegen → Dativ: dir (du)' },
    { v: 'sich etwas kaufen', ex: 'Ich habe mir ein neues Book gekauft.', a: 'mir', tr: 'Kendime yeni bir kitap aldım.', e: 'sich etwas kaufen → Dativ: mir (ich)' },
    { v: 'sich etwas kaufen', ex: 'Kauf dir doch endlich neue Schuhe!', a: 'dir', tr: 'Kendine artık yeni ayakkabı al!', e: 'sich etwas kaufen → Dativ: dir (du)' },
    { v: 'sich Sorgen machen', ex: 'Ich mache mir Sorgen um die Zukunft.', a: 'mir', tr: 'Gelecek hakkında endişeleniyorum.', e: 'sich Sorgen machen → Dativ: mir (ich)' },
    { v: 'sich Sorgen machen', ex: 'Macht euch keine Sorgen, alles wird gut.', a: 'euch', tr: 'Endişelenmeyin, her şey iyi olacak.', e: 'sich Sorgen machen → Dativ: euch (ihr)' },
    { v: 'sich Sorgen machen', ex: 'Sie macht sich Sorgen um ihre Eltern.', a: 'sich', tr: 'Ebeveynleri hakkında endişeleniyor.', e: 'sich Sorgen machen → Dativ: sich (sie)' }
  ];

  dativVerbs.forEach(item => {
    const regex = new RegExp('\\b' + item.a + '\\b', 'i');
    const qText = item.ex.replace(regex, '___');
    list.push({
      verb: item.v,
      q: qText,
      a: item.a,
      o: getReflexivePronounOptions(item.a),
      e: item.e,
      tr: item.tr
    });
  });

  return list;
}

function getReflexivePronounOptions(correct) {
  const all = ['mich', 'mir', 'dich', 'dir', 'sich', 'uns', 'euch'];
  const filtered = all.filter(p => p !== correct);
  const distractors = filtered.sort(() => Math.random() - 0.5).slice(0, 3);
  return [correct, ...distractors].sort(() => Math.random() - 0.5);
}

function startReflexiveQuiz() {
  let pool = generateReflexiveQuizData();
  
  if (rqState.cat === 'akk') {

function checkReflexiveQ(btn) {
  if (rqState.answered) return;
  rqState.answered = true;
  
  const q = rqState.data[rqState.idx];
  const chosen = btn.getAttribute('data-val');
  const correct = q.a;
  const isOk = chosen === correct;
  
  if (isOk) rqState.score++;
  
  document.querySelectorAll('#reflexive-opts .obtn').forEach(b => {
    b.disabled = true;
    const t = b.getAttribute('data-val');
    if (t === correct) {
      b.classList.add(isOk && t === chosen ? 'correct' : 'show-ok');
    } else if (t === chosen && !isOk) {
      b.classList.add('wrong');
    }
  });
  
  const fb = document.getElementById('rqfb');
  if (fb) {
    fb.innerHTML = `
      <div class="fb2 ${isOk ? 'ok' : 'no'}">

  const chosenDistractors = distractors.sort(() => Math.random() - 0.5).slice(0, 7);
  const preps = [correctPrep, ...chosenDistractors].sort(() => Math.random() - 0.5);

  c.innerHTML=`<div class="ptxt">${pqIdx+1} / ${pqData.length}</div>
  <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  <div class="qcard">
    <div class="qtype">Edat ve da(r) Önekini Eşleştirin</div>
    <div style="text-align:center;font-size:14px;color:var(--text-3);margin-bottom:4px;">Fiil:</div>
    <div class="qsent" style="font-size:24px;margin-bottom:4px;"><strong>${q.verb}</strong></div>
    
    <div class="pa-formula">
      <span class="val" id="pa-formula-prefix">Önek</span> + <span class="val" id="pa-formula-prep">Edat</span>
    </div>

    <div style="margin-top:16px;">
      <div class="pa-opt-lbl">1. Önek Seçin</div>
      <div class="pa-opt-grid-prefix">
        <button class="pa-opt-btn" id="pa-pref-da" onclick="selectPAPrefix('da')">da-</button>
        <button class="pa-opt-btn" id="pa-pref-dar" onclick="selectPAPrefix('dar')">dar-</button>
      </div>

      <div class="pa-opt-lbl">2. Edat Seçin</div>
      <div class="pa-opt-grid">
        ${preps.map(p=>`<button class="pa-opt-btn" id="pa-prep-${p}" onclick="selectPAPrep('${p}')">${p}</button>`).join('')}
      </div>
    </div>

    <button class="nbtn" id="pa-check-btn" onclick="checkPAQuizAnswer()" disabled style="width:100%;margin-top:12px;">Kontrol Et</button>
    <div id="pafb"></div>
  </div>`;
}

function selectPAPrefix(val){
  if(pqAnswered)return;
  selectedPA.prefix=val;
  document.getElementById('pa-formula-prefix').textContent=val;
  document.getElementById('pa-pref-da').classList.toggle('selected',val==='da');
  document.getElementById('pa-pref-dar').classList.toggle('selected',val==='dar');
  validatePASelection();
}

function selectPAPrep(val){
  if(pqAnswered)return;
  selectedPA.prep=val;
  document.getElementById('pa-formula-prep').textContent=val;
  document.querySelectorAll('.pa-opt-grid .pa-opt-btn').forEach(el=>{
    const p = el.textContent.trim();
    el.classList.toggle('selected', p===val);
  });
  validatePASelection();
}

function validatePASelection(){
  const btn=document.getElementById('pa-check-btn');
  if(btn){
    btn.disabled=!(selectedPA.prefix && selectedPA.prep);
  }
}

function checkPAQuizAnswer(){
  if(pqAnswered)return;pqAnswered=true;
  const q=pqData[pqIdx];
  const chosenPrefix=selectedPA.prefix;
  const chosenPrep=selectedPA.prep;
  
  const correctPrep=q.prep;
  const correctPrefix=q.dar.replace(q.prep,'');
  
  const isPrepCorrect=chosenPrep===correctPrep;
  const isPrefixCorrect=chosenPrefix===correctPrefix;
  const isOk=isPrepCorrect && isPrefixCorrect;
  
  if(isOk)pqScore++;
  adjustPAWordScore(q.verb,q.prep,isOk?1:-2);
  
  // Style prefix buttons
  document.getElementById('pa-pref-da').classList.remove('selected');
  document.getElementById('pa-pref-dar').classList.remove('selected');
  document.getElementById('pa-pref-'+correctPrefix).classList.add('correct');
  if(!isPrefixCorrect){
    document.getElementById('pa-pref-'+chosenPrefix).classList.add('wrong');
  }
  
  // Style prep buttons
  document.querySelectorAll('.pa-opt-grid .pa-opt-btn').forEach(el=>{
    const p = el.textContent.trim();
    el.classList.remove('selected');
    el.disabled=true;
    if(p===correctPrep)el.classList.add('correct');
    else if(p===chosenPrep && !isPrepCorrect)el.classList.add('wrong');
  });
  document.getElementById('pa-pref-da').disabled=true;
  document.getElementById('pa-pref-dar').disabled=true;
  
  // Update formula text color based on correctness
  document.getElementById('pa-formula-prefix').style.color=isPrefixCorrect?'var(--green)':'var(--red)';
  document.getElementById('pa-formula-prep').style.color=isPrepCorrect?'var(--green)':'var(--red)';
  
  // Generate smart feedback message
  let fbText='';
  if(isOk){
    fbText=`🎉 <strong>Doğru!</strong> <strong>${q.verb} + ${q.prep}</strong> yapısı <strong>${q.dar}</strong> (sorusu: <strong>${q.wor}</strong>) formunu oluşturur.`;
  } else if(isPrepCorrect && !isPrefixCorrect){
    fbText=`✗ <strong>Önek Yanlış!</strong> <strong>${q.verb} + ${q.prep}</strong> eşleşmesi doğru. Ancak <strong>${q.prep}</strong> sesli harfle başladığı için kaynaştırma 'r' alarak <strong>${q.dar}</strong> olmalıdır.`;
  } else {
    fbText=`✗ <strong>Yanlış!</strong> <strong>${q.verb}</strong> fiili <strong>${q.prep}</strong> edatı ile kullanılır ➔ <strong>${q.dar}</strong> (sorusu: <strong>${q.wor}</strong>).`;
  }
  
  const fbDiv=document.getElementById('pafb');
  fbDiv.innerHTML=`<div class="fb2 ${isOk?'ok':'no'}">${fbText}
    <div style="margin-top:6px;font-size:12px;opacity:.85;display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <div>📌 ${q.ex_da}</div>
      <button class="speak-btn" onclick="speak('${q.ex_da.replace(/'/g, "\\'")}')" style="padding:2px;color:inherit;opacity:0.8;" title="Telaffuz et"><svg viewBox="0 0 24 24" style="width:14px;height:14px;"><path fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg></button>
    </div>
    <div style="font-size:11px;opacity:.7;margin-top:3px">${q.ex_da_tr}</div>
  </div>
  <button class="nbtn" onclick="nextPA()" style="width:100%;margin-top:12px;">${pqIdx+1>=pqData.length?'Sonuçları Gör':'Sonraki →'}</button>`;
  
  document.getElementById('pa-check-btn').style.display='none';
  speak(q.ex_da);
}

function nextPA(){pqIdx++;renderPAQuiz();}

// ═══════════════════════════════════════════
// STATS & STREAK LOGIC
// ═══════════════════════════════════════════
let userStats = {
  streak: 0,
  maxStreak: 0,
  lastActiveDate: null,
  quizCount: 0,
  quizScores: []
};

function loadStats() {
  try {
    const saved = localStorage.getItem('deutsch_verben_stats');
    if (saved) {
      userStats = JSON.parse(saved);
      if (userStats.streak === undefined) userStats.streak = 0;
      if (userStats.maxStreak === undefined) userStats.maxStreak = 0;
      if (userStats.lastActiveDate === undefined) userStats.lastActiveDate = null;
      if (userStats.quizCount === undefined) userStats.quizCount = 0;
      if (userStats.quizScores === undefined) userStats.quizScores = [];
    }
  } catch (e) {
    console.warn("Stats load failed:", e);
  }
}

function saveStats() {
  try {
    localStorage.setItem('deutsch_verben_stats', JSON.stringify(userStats));
  } catch (e) {}
}

function getTodayDateString() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function getYesterdayDateString() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function checkAndUpdateStreak(isQuizCompleted = false) {
  const todayStr = getTodayDateString();
  const yesterdayStr = getYesterdayDateString();
  
  if (isQuizCompleted) {
    if (userStats.lastActiveDate === yesterdayStr) {
      userStats.streak++;
      userStats.lastActiveDate = todayStr;
    } else if (userStats.lastActiveDate === null) {
      userStats.streak = 1;
      userStats.lastActiveDate = todayStr;
    } else if (userStats.lastActiveDate !== todayStr) {
      userStats.streak = 1;
      userStats.lastActiveDate = todayStr;
    }
    
    if (userStats.streak > userStats.maxStreak) {
      userStats.maxStreak = userStats.streak;
    }
    saveStats();
    updateStreakUI();
  } else {
    if (userStats.lastActiveDate !== null && userStats.lastActiveDate !== yesterdayStr && userStats.lastActiveDate !== todayStr) {
      userStats.streak = 0;
      saveStats();
      updateStreakUI();
    }
  }
}

function recordQuizCompletion(score, total) {
  const pct = Math.round((score / total) * 100);
  userStats.quizCount++;
  userStats.quizScores.push(pct);
  if (userStats.quizScores.length > 20) {
    userStats.quizScores.shift();
  }
  saveStats();
  checkAndUpdateStreak(true);
}

function updateStreakUI() {
  const badge = document.getElementById('streak-badge');
  const count = document.getElementById('streak-count');
  if (!badge || !count) return;
  
  if (userStats.streak > 0) {
    count.textContent = userStats.streak;
    badge.style.display = 'flex';
    
    const todayStr = getTodayDateString();
    if (userStats.lastActiveDate === todayStr) {
      badge.classList.add('completed');
      badge.title = `Bugün çalışarak seriyi korudun! (${userStats.streak} Gün)`;
    } else {
      badge.classList.remove('completed');
      badge.title = `Seriyi devam ettirmek için bugün bir sınav çözün!`;
    }
  } else {
    badge.style.display = 'none';
  }
}

function renderQuizHistoryChart() {
  const scores = userStats.quizScores || [];
  if (scores.length === 0) {
    return `<div style="text-align: center; color: var(--text-3); font-size: 11px; padding: 20px 0;">Henüz sınav tamamlanmadı.</div>`;
  }
  
  const lastScores = scores.slice(-10);
  const chartHeight = 80;
  const barWidth = 16;
  const gap = 10;
  const width = lastScores.length * (barWidth + gap) - gap;
  
  let barsHTML = '';
  lastScores.forEach((score, idx) => {
    const height = (score / 100) * chartHeight;
    const x = idx * (barWidth + gap);
    const y = chartHeight - height;
    const color = score >= 80 ? 'var(--green)' : (score >= 50 ? 'var(--accent)' : 'var(--red)');
    
    barsHTML += `
      <g class="chart-bar-group">
        <rect x="${x}" y="${y}" width="${barWidth}" height="${height}" rx="3" fill="${color}" opacity="0.85">
          <animate attributeName="height" from="0" to="${height}" dur="0.4s" begin="${idx * 0.05}s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
          <animate attributeName="y" from="${chartHeight}" to="${y}" dur="0.4s" begin="${idx * 0.05}s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1"/>
        </rect>
        <text x="${x + barWidth/2}" y="${y - 4}" font-family="var(--font)" font-size="9" font-weight="700" fill="var(--text-2)" text-anchor="middle">%${score}</text>
        <text x="${x + barWidth/2}" y="${chartHeight + 12}" font-family="var(--font)" font-size="8" font-weight="600" fill="var(--text-3)" text-anchor="middle">S${scores.length - lastScores.length + idx + 1}</text>
      </g>
    `;
  });
  
  return `
    <div style="display: flex; justify-content: center; align-items: center; padding: 12px 0 24px; overflow-x: auto;">
      <svg width="${width}" height="${chartHeight + 18}" style="overflow: visible;">
        ${barsHTML}
      </svg>
    </div>
  `;
}

function renderStats() {
  const container = document.getElementById('stats-c');
  if (!container) return;
  
  const total = V.length;
  let mastered = 0, learning = 0, unseen = 0;
  
  V.forEach(v => {
    const s = getWordState(v.v, v.p).score || 0;
    if (s === 5) mastered++;
    else if (s > 0) learning++;
    else unseen++;
  });
  
  const masteredPct = total > 0 ? Math.round((mastered / total) * 100) : 0;
  const learningPct = total > 0 ? Math.round((learning / total) * 100) : 0;
  const unseenPct = total > 0 ? 100 - masteredPct - learningPct : 100;
  
  const levels = ['A1', 'A2', 'B1', 'B2'];
  const levelData = levels.map(lvl => {
    const pool = V.filter(v => v.l === lvl);
    const m = pool.filter(v => getWordState(v.v, v.p).score === 5).length;
    const pct = pool.length > 0 ? Math.round((m / pool.length) * 100) : 0;
    return { lvl, m, total: pool.length, pct };
  });
  
  const cases = ['Akk', 'Dat'];
  const caseData = cases.map(k => {
    const pool = V.filter(v => v.k === k);
    const m = pool.filter(v => getWordState(v.v, v.p).score === 5).length;
    const pct = pool.length > 0 ? Math.round((m / pool.length) * 100) : 0;
    return { 
      name: k === 'Akk' ? 'Akkusativ' : 'Dativ', 
      m, 
      total: pool.length, 
      pct, 
      color: k === 'Akk' ? 'var(--akk-c)' : 'var(--dat-c)' 
    };
  });
  
  const todayStr = getTodayDateString();
  const streakCompletedToday = userStats.lastActiveDate === todayStr;
  const streakMsg = streakCompletedToday 
    ? '🎉 Harika! Bugünün günlük hedefini tamamladın ve seriyi korudun.' 
    : '⏳ Seriyi kaybetmemek veya başlatmak için bugün bir sınav (Quiz / PA Quiz) çözün!';
  
  const avgScore = userStats.quizScores.length > 0 
    ? Math.round(userStats.quizScores.reduce((a, b) => a + b, 0) / userStats.quizScores.length) 
    : 0;
  
  let html = `
    <!-- STREAK CARD -->
    <div class="stats-card" style="border-left: 4px solid var(--orange); position: relative; overflow: hidden;">
      <div style="position: absolute; right: 16px; top: 16px; font-size: 50px; opacity: 0.15; user-select: none;">🔥</div>
      <div class="stats-card-title">Günlük Seri (Streak)</div>
      <div style="display: flex; align-items: baseline; gap: 8px;">
        <span class="stats-val-large">${userStats.streak}</span>
        <span style="font-weight: 700; color: var(--text-2); font-size: 14px;">Günlük Aktif Seri</span>
      </div>
      <div style="font-size: 11px; font-weight: 600; color: var(--text-3); margin-top: 4px;">
        En Uzun Seri: <strong style="color: var(--text-1);">${userStats.maxStreak} Gün</strong>
      </div>
      <div style="font-size: 12px; color: ${streakCompletedToday ? 'var(--green)' : 'var(--orange)'}; font-weight: 600; margin-top: 12px; border-top: 1px solid var(--border-1); padding-top: 8px; line-height: 1.4; text-align: left;">
        ${streakMsg}
      </div>
    </div>
    
    <!-- WORD LEARNING STATE -->
    <div class="stats-card">
      <div class="stats-card-title">Kelime Öğrenme İlerlemesi</div>
      <div style="display: flex; align-items: baseline; gap: 6px;">
        <span class="stats-val-large">${mastered}</span>
        <span style="font-weight: 600; color: var(--text-2); font-size: 12px;">/ ${total} kelime tamamen öğrenildi</span>
      </div>
      
      <div class="multi-progress">
        <div class="multi-progress-segment" style="width: ${masteredPct}%; background: var(--green);" title="Tamamen Öğrenildi (%${masteredPct})"></div>
        <div class="multi-progress-segment" style="width: ${learningPct}%; background: var(--accent);" title="Öğrenme Aşamasında (%${learningPct})"></div>
        <div class="multi-progress-segment" style="width: ${unseenPct}%; background: var(--border-3);" title="Görülmedi (%${unseenPct})"></div>
      </div>
      
      <div class="multi-legend">
        <div class="legend-item"><span class="legend-dot" style="background: var(--green);"></span> Öğrenildi (${mastered})</div>
        <div class="legend-item"><span class="legend-dot" style="background: var(--accent);"></span> Öğreniliyor (${learning})</div>
        <div class="legend-item"><span class="legend-dot" style="background: var(--text-3);"></span> Görülmedi (${unseen})</div>
      </div>
    </div>
    
    <!-- LEVEL BREAKDOWN -->
    <div class="stats-card">
      <div class="stats-card-title">Seviye Başarı Oranları</div>
      <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 4px;">
        ${levelData.map(ld => `
          <div class="stats-bar-group">
            <div class="stats-bar-lbl">
              <span style="font-weight: 700; color: var(--text-1);">${ld.lvl} Seviyesi</span>
              <span style="color: var(--text-2); font-size: 11px;">%${ld.pct} (${ld.m}/${ld.total})</span>
            </div>
            <div class="stats-progress-bg">
              <div class="stats-progress-fill" style="width: ${ld.pct}%; background: var(--${ld.lvl.toLowerCase()});"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <!-- KASUS BREAKDOWN -->
    <div class="stats-card">
      <div class="stats-card-title">Edat Durumu (Kasus) Analizi</div>
      <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 4px;">
        ${caseData.map(cd => `
          <div class="stats-bar-group">
            <div class="stats-bar-lbl">
              <span style="font-weight: 700; color: ${cd.color};">${cd.name}</span>
              <span style="color: var(--text-2); font-size: 11px;">%${cd.pct} (${cd.m}/${cd.total})</span>
            </div>
            <div class="stats-progress-bg">
              <div class="stats-progress-fill" style="width: ${cd.pct}%; background: ${cd.color};"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <!-- QUIZ STATS & CHART -->
    <div class="stats-card">
      <div class="stats-card-title">Sınav Performansı</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
        <div style="background: var(--bg-card-alt); border: 1px solid var(--border-1); border-radius: var(--r-md); padding: 10px; text-align: center;">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Toplam Sınav</div>
          <div style="font-size: 20px; font-weight: 800; color: var(--text-1);">${userStats.quizCount}</div>
        </div>
        <div style="background: var(--bg-card-alt); border: 1px solid var(--border-1); border-radius: var(--r-md); padding: 10px; text-align: center;">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;">Ortalama Skor</div>
          <div style="font-size: 20px; font-weight: 800; color: ${avgScore >= 80 ? 'var(--green)' : (avgScore >= 50 ? 'var(--accent)' : 'var(--red)')};">%${avgScore}</div>
        </div>
      </div>
      
      <div style="font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; text-align: left;">Son Sınav Sonuçları (Trend)</div>
      ${renderQuizHistoryChart()}
    </div>
    
    <!-- RESET BUTTON -->
    <button class="reset-btn" onclick="confirmResetAllProgress()">
      🗑️ Tüm İlerlemeyi ve İstatistikleri Sıfırla
    </button>
  `;
  
  container.innerHTML = html;
}

function confirmResetAllProgress() {
  const conf1 = confirm("⚠️ DİKKAT!\nTüm öğrenme ilerlemeniz, favorileriniz, istatistikleriniz ve günlük seriniz kalıcı olarak sıfırlanacaktır. Bu işlem geri alınamaz!\n\nDevam etmek istiyor musunuz?");
  if (conf1) {
    const conf2 = confirm("Son bir kez onaylayın:\nTüm verilerinizi tamamen silmek istediğinizden emin misiniz?");
    if (conf2) {
      localStorage.removeItem('deutsch_verben_progress');
      localStorage.removeItem('deutsch_verben_stats');
      
      loadProgress();
      loadStats();
      checkAndUpdateStreak(false);
      updateProgressUI();
      updateStreakUI();
      renderListe();
      applyFCFilter();
      renderFC();
      initPAData();
      renderPATable();
      
      switchTab('liste');
      alert("Tüm ilerlemeniz başarıyla sıfırlandı!");
    }
  }
}
